<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WodneCustomy - Ustawienia</title>
</head>
<body>
  <header>
    <h1>WodneCustomy</h1>
    <nav>
      <ul>
        <li><a href="index.html">Mecze</a></li>
        <li><a href="players.html">Gracze</a></li>
        <li><a href="stats.html">Statystyki</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="settings.html">Ustawienia</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="settings-section">
      <h2>Ustawienia</h2>
      <p>
        Te ustawienia są zapisywane wyłącznie w Twojej przeglądarce (localStorage) -
        nie są nigdzie wysyłane poza Twój Arkusz Google.
      </p>
      <form id="settings-form">
        <fieldset>
          <legend>Google Apps Script</legend>
          <p>
            <label for="appsScriptUrl">Adres URL wdrożonej aplikacji internetowej (kończy się na /exec)</label><br />
            <input type="text" id="appsScriptUrl" name="appsScriptUrl" size="80" />
          </p>
          <p>
            <label for="sharedSecret">Sekret (SHARED_SECRET z Apps Script) - wymagany do edycji danych</label><br />
            <input type="password" id="sharedSecret" name="sharedSecret" size="60" />
          </p>
        </fieldset>
        <p><button type="submit">Zapisz ustawienia</button></p>
      </form>
      <p><button type="button" id="test-connection-btn">Testuj połączenie</button> <span id="test-connection-result"></span></p>
    </section>

    <section id="log-section">
      <h2>Dziennik zdarzeń</h2>
      <ul id="log-list"></ul>
    </section>
  </main>

  <script src="js/common.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
