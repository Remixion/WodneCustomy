<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WodneCustomy - Statystyki</title>
</head>
<body>
  <header>
    <h1>WodneCustomy</h1>
    <nav>
      <ul>
        <li><a href="index.html">Mecze</a></li>
        <li><a href="players.html">Gracze</a></li>
        <li><a href="stats.html">Statystyki</a></li>
        <li><a href="settings.html">Ustawienia</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="status-section">
      <p id="status-message">Wczytywanie danych z Google Sheets...</p>
      <p><button id="refresh-btn" type="button">Odśwież</button></p>
    </section>

    <section id="general-stats-section">
      <h2>Statystyki ogólne</h2>
      <dl id="general-stats-list"></dl>
    </section>

    <section id="rankings-section">
      <h2>Rankingi</h2>
      <div id="rankings-container"></div>
    </section>

    <section id="individual-stats-section">
      <h2>Statystyki indywidualne</h2>
      <table id="individual-stats-table" border="1">
        <thead></thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="log-section">
      <h2>Dziennik zdarzeń</h2>
      <ul id="log-list"></ul>
    </section>
  </main>

  <script src="js/common.js"></script>
  <script src="js/statsCore.js"></script>
  <script src="js/stats.js"></script>
</body>
</html>
