<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <title>WodneCustomy - Profile</title>
</head>
<body>
  <header>
    <h1>WodneCustomy</h1>
    <nav>
      <ul>
        <li><a href="index.html">Mecze</a></li>
        <li><a href="players.html">Gracze</a></li>
        <li><a href="stats.html">Statystyki</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="settings.html">Ustawienia</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="status-section">
      <p id="status-message">Wczytywanie...</p>
      <p><button id="refresh-btn" type="button">Odśwież</button></p>
    </section>

    <section id="profile-detail-section" hidden>
      <h2 id="profile-name"></h2>
      <p><img id="profile-avatar" width="96" height="96" alt="Awatar gracza" /></p>
      <dl id="profile-info-list"></dl>

      <h3>Ostatnie mecze</h3>
      <table id="recent-matches-table" border="1">
        <thead>
          <tr>
            <th>Data</th>
            <th>Champion</th>
            <th>Wynik</th>
            <th>K/D/A</th>
            <th>KDA</th>
            <th>CS</th>
            <th>Obrażenia bohaterom</th>
            <th>Akcje</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="player-list-section">
      <h2>Wybierz gracza</h2>
      <table id="player-list-table" border="1">
        <thead>
          <tr>
            <th>Avatar</th>
            <th>Gracz</th>
            <th>Gry</th>
            <th>% wygranych</th>
            <th>Akcje</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="log-section">
      <h2>Dziennik zdarzeń</h2>
      <ul id="log-list"></ul>
    </section>
  </main>

  <script src="js/common.js"></script>
  <script src="js/statsCore.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
