<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <title>WodneCustomy - Losowanie składu</title>
</head>
<body>
  <header>
    <h1>WodneCustomy</h1>
    <nav>
      <ul>
        <li><a href="index.html">Mecze</a></li>
        <li><a href="players.html">Gracze</a></li>
        <li><a href="randomizer.html">Losowanie</a></li>
        <li><a href="stats.html">Statystyki</a></li>
        <li><a href="settings.html">Ustawienia</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="add-player-section">
      <h2>Dodaj nowego gracza</h2>
      <p>
        <label for="new-player-nick">Nick</label>
        <input type="text" id="new-player-nick" size="20" />
        <label for="new-player-riotid">Riot ID (opcjonalnie)</label>
        <input type="text" id="new-player-riotid" size="20" placeholder="Nazwa#Tag" />
        <label for="new-player-color">Kolor</label>
        <select id="new-player-color">
          <option value="">Domyślny (przypisany automatycznie)</option>
        </select>
        <button type="button" id="add-player-btn">Dodaj gracza</button>
      </p>
    </section>

    <section id="select-section">
      <h2>Wybierz 10 graczy</h2>
      <p>
        <label for="player-search">Szukaj (nick / Riot ID / Discord)</label>
        <input type="text" id="player-search" size="30" />
      </p>
      <p id="selected-count">Wybrano: 0/10</p>
      <div id="player-list">Wczytywanie...</div>
      <p>
        <button type="button" id="randomize-btn" disabled>Losuj skład</button>
        <button type="button" id="clear-selection-btn">Wyczyść wybór</button>
      </p>
    </section>

    <section id="result-section">
      <h2>Wynik losowania</h2>
      <div id="randomizer-result">
        <p>Wybierz dokładnie 10 graczy i kliknij "Losuj skład".</p>
      </div>
    </section>

    <section id="log-section">
      <h2>Dziennik zdarzeń</h2>
      <ul id="log-list"></ul>
    </section>
  </main>

  <script src="js/common.js"></script>
  <script src="js/randomizer.js"></script>
</body>
</html>
