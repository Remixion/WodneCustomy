<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <title>WodneCustomy - Gracze</title>
</head>
<body>
  <header>
    <h1>WodneCustomy</h1>
    <nav>
      <ul>
        <li><a href="index.html">Mecze</a></li>
        <li><a href="players.html">Gracze</a></li>
        <li><a href="randomizer.html">Losowanie</a></li>
        <li><a href="stats.html">Statystyki</a></li>
        <li><a href="settings.html">Ustawienia</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="status-section">
      <p><button id="refresh-btn" type="button">Odśwież</button></p>
    </section>

    <section id="profile-detail-section" hidden>
      <h2 id="profile-name"></h2>
      <p><img id="profile-avatar" width="96" height="96" alt="Awatar gracza" /></p>
      <dl id="profile-info-list"></dl>

      <h3>Ostatnie mecze</h3>
      <table id="recent-matches-table" border="1">
        <thead>
          <tr>
            <th>Data</th>
            <th>Champion</th>
            <th>Wynik</th>
            <th>K/D/A</th>
            <th>KDA</th>
            <th>CS</th>
            <th>Obrażenia bohaterom</th>
            <th>Akcje</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="players-section">
      <h2>Profile graczy</h2>
      <p>
        <button id="push-all-btn" type="button">Wyślij wszystkich graczy do Google Sheets</button>
        <button id="cleanup-zero-games-btn" type="button">Usuń graczy bez rozegranych meczów</button>
      </p>
      <table id="players-table" border="1">
        <thead></thead>
        <tbody>
          <tr><td>Wczytywanie...</td></tr>
        </tbody>
      </table>
    </section>

    <section id="log-section">
      <h2>Dziennik zdarzeń</h2>
      <ul id="log-list"></ul>
    </section>
  </main>

  <script src="js/common.js"></script>
  <script src="js/statsCore.js"></script>
  <script src="js/players.js"></script>
</body>
</html>
